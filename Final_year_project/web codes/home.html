<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WellNest - Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        Roboto, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 20px 40px rgba(102, 126, 234, 0.25);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .logo {
      font-size: 38px;
      font-weight: 800;
      color: brown;
      margin-bottom: 12px;
    }

    .welcome {
      font-size: 26px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .greeting {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 32px;
    }

    .quote {
      background: #f8fafc;
      border-radius: 20px;
      padding: 24px 28px;
      margin-bottom: 32px;
      font-size: 17px;
      color: #334155;
      font-weight: 500;
      line-height: 1.5;
      border-left: 4px solid #3b82f6;
      border-right: 4px solid #3b82f6;
    }

    .quote-author {
      margin-top: 12px;
      font-size: 14px;
      color: #64748b;
      font-weight: 600;
    }

    .marquee {
      overflow: hidden;
      margin: 24px 0 36px;
      height: 22px;
    }

    .marquee-content {
      display: flex;
      animation: scroll 25s linear infinite;
      gap: 40px;
    }

    .marquee-item {
      font-size: 16px;
      font-weight: 600;
      color: #3b82f6;
      white-space: nowrap;
    }

    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .nav-btn {
      padding: 18px 24px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .nav-btn.primary {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
    }

    .nav-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(59, 130, 246, 0.4);
    }

    .nav-btn.secondary {
      background: white;
      color: #1e293b;
      border: 2px solid #e2e8f0;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .nav-btn.secondary:hover {
      border-color: #3b82f6;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
    }

    .logout-section {
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }

    .logout-btn {
      padding: 12px 20px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.15);
      color: #64748b;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .logout-btn:hover {
      border-color: rgba(255, 255, 255, 0.7);
      color: #dc2626;
      background: #fee2e2;
    }

    @media (max-width: 480px) {
      .container {
        margin: 12px;
        padding: 40px 32px;
      }
      .logo { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">WellNest</div>
    
    <div class="welcome">Welcome back!</div>
    <div class="greeting">Ready to nurture your wellbeing today?</div>

    <div class="quote">
      "Take care of your body. It's the only place you have to live."
      <div class="quote-author">— Jim Rohn</div>
    </div>

    <div class="marquee">
      <div class="marquee-content">
        <span class="marquee-item">Breathe deeply · Move gently · Rest fully</span>
        <span class="marquee-item">Breathe deeply · Move gently · Rest fully</span>
      </div>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn primary">🏠 Home</button>
    <button class="nav-btn secondary" onclick='location.href="goals.html"'>🎯 Goals</button>

    </div>

    <div class="logout-section">
      <button class="logout-btn" onclick="handleLogout()">
        ➜] Logout
      </button>
    </div>
  </div>

  <script>
    function handleLogout() {
      if (confirm('Ready to sign out?')) {
        window.location.href = 'login.html';
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WellNest – Goal Selection</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* MAIN CONTAINER (INCREASED SIZE) */
    .mobile {
      width: 480px;
      min-height: 520px;
      background: #d7c3e4;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    }

    /* BRAND */
    .header {
      text-align: center;
      font-weight: 600;
      color: #4f46e5;
      margin-bottom: 24px;
      font-size: 18px;
    }
    .back-container {
  display: flex;
  justify-content: center;
  margin: 20px 0;
}


    /* TITLE */
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #111;
    }

    .subtitle {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 28px;
    }

    /* GOAL CARDS */
    .card {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 18px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.3s;
    }

    .card:hover {
      background: #e0e7ff;
      box-shadow: 0 4px 10px rgba(79,70,229,0.15);
    }

    .card.active {
      border-color: #4f46e5;
      background: #eef2ff;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 16px;
    }

    .gain { background: #e0e7ff; color: #4338ca; }
    .loss { background: #d1fae5; color: #047857; }
    .maintain { background: #ffedd5; color: #c2410c; }

    .title {
      font-weight: 600;
      font-size: 17px;
      color: #111;
    }

    .desc {
      font-size: 14px;
      color: #6b7280;
    }

    /* RESPONSIVE FOR LAPTOP */
    @media (min-width: 1024px) {
      .mobile {
        width: 520px;
      }
    }
  </style>
</head>

<body>

  <div class="mobile">
    <div class="header">WellNest</div>

    <h1>What's your goal?</h1>
    <p class="subtitle">
      Choose your fitness goal to get personalized recommendations
    </p>

    <div class="card" onclick="location.href='weightGain.html'">
      <div class="icon gain">📈</div>
      <div>
        <div class="title">Weight Gain</div>
        <div class="desc">Build muscle and increase body weight</div>
      </div>
    </div>


    <div class="card" onclick="location.href='w8loss.html'">
      <div class="icon loss">📉</div>
      <div>
        <div class="title">Weight Loss</div>
        <div class="desc">Burn fat and reduce body weight</div>
      </div>
    </div>

    <div class="card" onclick="location.href='maintain.html'">
      <div class="icon maintain">➡️</div>
      <div>
        <div class="title">Weight Maintain</div>
        <div class="desc">Stay healthy and maintain current weight</div>
      </div>
    </div>
    <div class="back-container">
  <a href="home.html" class="back-link">Back</a>
</div>
  </div>

  <script>
    function selectGoal(element, goal) {
      document.querySelectorAll('.card').forEach(card => {
        card.classList.remove('active');
      });

      element.classList.add('active');
      console.log("Selected Goal:", goal);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WellNest - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* ==== RESET ==== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        Roboto, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    /* ==== SHARED STYLES ==== */
    .container {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }

    .header {
      background: linear-gradient(135deg, #a855f7 0%, #3b82f6 50%, #10b981 100%);
      padding: 48px 40px 32px;
      text-align: center;
      color: white;
    }

    .logo {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .content {
      padding: 40px 40px 48px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      color: #1f2937;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 36px;
      text-align: center;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 12px;
    }

    .input-field {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      background: #f9fafb;
      transition: all 0.2s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #3b82f6;
      background: white;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .input-field::placeholder {
      color: #9ca3af;
    }

    .password-wrapper {
      position: relative;
    }

    .password-eye {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #9ca3af;
      user-select: none;
    }

    .cta-button {
      width: 100%;
      padding: 18px 24px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 12px 0 28px;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
    }

    .cta-button:active {
      transform: translateY(0);
    }

    .link-section {
      text-align: center;
      color: #6b7280;
      font-size: 15px;
    }

    .link-section a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }

    .link-section a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .container { margin: 0; border-radius: 20px; }
      .header { padding: 40px 24px 28px; }
      .logo { font-size: 32px; }
      .content { padding: 32px 24px 40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Unified Header -->
    <div class="header">
      <div class="logo">WellNest</div>
    </div>

    <!-- Unified Content -->
    <div class="content">
      <div class="title">Welcome Back!</div>
      <div class="subtitle">Let's get started by filling out the form below.</div>
      
      <form>
        <div class="input-group">
          <label class="input-label">Email</label>
          <input type="email" class="input-field" placeholder="Enter your email" required>
        </div>
        
        <div class="input-group password-wrapper">
          <label class="input-label">Password</label>
          <input type="password" class="input-field" placeholder="Enter your password" required>
          <span class="password-eye" onclick="togglePassword()">👁</span>
        </div>
        
        <button class="cta-button" onclick="location.href='basicInfo.html'">Login </button>

      </form>
      
      <div class="link-section">
        Don't have an account? <a href="create acc.html">Sign up here</a>
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const passwordFields = document.querySelectorAll('.input-field[type="password"]');
      passwordFields.forEach(field => {
        const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
        field.setAttribute('type', type);
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WellNest – Medical Information</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    /* ==== RESET ==== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        Roboto, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    /* ==== CONTAINER ==== */
    .container {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      padding: 36px 32px 40px;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      color: #1f2937;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ==== INPUTS ==== */
    .input-group {
      margin-bottom: 22px;
    }

    .input-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 10px;
    }

    .input-field {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      background: #f9fafb;
    }

    .input-field:focus {
      outline: none;
      border-color: #3b82f6;
      background: white;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
    }

    textarea.input-field {
      resize: none;
      height: 90px;
    }
    .back-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
    }

    /* ==== ROW ==== */
    .row {
      display: flex;
      gap: 14px;
    }

    .row .input-group {
      flex: 1;
    }

    /* ==== INFO BOX ==== */
    .info-box {
      background: #eef2ff;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      color: #4338ca;
      margin: 18px 0 26px;
      line-height: 1.5;
    }

    /* ==== BUTTON ==== */
    .cta-button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(79,70,229,0.35);
      transition: 0.2s;
    }

    .cta-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    @media (max-width: 480px) {
      .container { padding: 28px 22px 34px; }
      .title { font-size: 24px; }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">Medical Information</div>

    <!-- Medical Conditions -->
    <div class="input-group">
      <label class="input-label">Medical Conditions</label>
      <select class="input-field" id="medicalCondition" onchange="enableButton()">
        <option value="">Select your medical condition</option>
        <option value="diabetes">Diabetes</option>
        <option value="bp">BP</option>
        <option value="diabetes_bp">Diabetes & BP</option>
        <option value="thyroid">Thyroid</option>
      </select>
    </div>

    <!-- Additional Info -->
    <div class="input-group">
      <label class="input-label">Additional Information</label>
      <textarea class="input-field"
        placeholder="Please provide any additional medical information, allergies, medications, or special considerations..."></textarea>
    </div>

    <!-- Target Weight & Time Frame -->
    <div class="row">
      <div class="input-group">
        <label class="input-label">Target Weight (kg)</label>
        <input type="number" class="input-field" placeholder="e.g. 70">
      </div>

      <div class="input-group">
        <label class="input-label">Time Frame (days)</label>
        <input type="number" class="input-field" placeholder="e.g. 90">
      </div>
    </div>

    <!-- Info Note -->
    <div class="info-box">
      Please consult with your healthcare provider before starting any weight management program,
      especially if you have existing medical conditions.
    </div>

    <!-- Save Button -->
     
    <button class="cta-button" onclick="location.href='home.html'">Save medical Information </button>
    <div class="back-container">
    <a href="basicInfo.html" class="back-link">Back</a>
    </div>
  </div>
  

  <script>
    function enableButton() {
      const dropdown = document.getElementById("medicalCondition");
      const button = document.getElementById("saveBtn");

      if (dropdown.value !== "") {
        button.disabled = false;
      } else {
        button.disabled = true;
      }
    }
  </script>


</body>
</html>
